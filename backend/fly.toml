app = "tuev-smartcal-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  FALKORDB_HOST = "tuev-smartcal-db.internal"
  FALKORDB_PORT = "6379"
  FALKORDB_GRAPH = "smartcal"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
